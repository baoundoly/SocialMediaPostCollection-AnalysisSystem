version: "3.9"
services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: social_media_db
    ports: ["5432:5432"]
    volumes: [postgres_data:/var/lib/postgresql/data]
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
  api:
    build: .
    ports: ["8000:8000"]
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/social_media_db
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: change-me-in-production
      ENCRYPTION_KEY: Fk3dL9mN2pQrStUvWxYzAbCdEfGhIjKl
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on: [db, redis]
  worker:
    build: .
    command: celery -A app.tasks.celery_worker worker --loglevel=info
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/social_media_db
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: change-me-in-production
      ENCRYPTION_KEY: Fk3dL9mN2pQrStUvWxYzAbCdEfGhIjKl
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on: [db, redis]
  beat:
    build: .
    command: celery -A app.tasks.celery_worker beat --loglevel=info
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/social_media_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on: [db, redis]
volumes:
  postgres_data:
